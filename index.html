<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등부 출석부</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-light: #eff6ff;
            --primary-dark: #1d4ed8;
            --bg: #f0f4f8;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #94a3b8;
            --border: #e2e8f0;
            --success: #22c55e;
            --success-bg: #f0fdf4;
            --danger: #ef4444;
            --danger-bg: #fef2f2;
            --gold: #f59e0b;
            --gold-bg: #fffbeb;
            --radius: 16px;
            --radius-sm: 10px;
            --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Nanum Gothic', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 16px;
            min-height: 100vh;
            -webkit-tap-highlight-color: transparent;
        }

        /* 모달 오픈 시 배경 스크롤 차단 */
        body.modal-open { overflow: hidden; }

        .main-container { max-width: 560px; margin: 0 auto; }

        /* ── 헤더 카드 ── */
        .header-card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 20px;
            margin-bottom: 14px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .app-title {
            font-size: 1.25rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text);
        }

        .talent-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #92400e;
            background: var(--gold-bg);
            border: 1.5px solid #fde68a;
            padding: 7px 13px;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.15s;
            white-space: nowrap;
        }
        .talent-btn:active { background: #fef3c7; }

        .controls { display: flex; gap: 10px; }

        .styled-input {
            flex: 1;
            padding: 11px 14px;
            font-size: 0.9rem;
            font-family: inherit;
            font-weight: 700;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            text-align: center;
        }
        .styled-input:focus { border-color: var(--primary); background: white; }
        #datePicker { color: var(--primary); border-color: #bfdbfe; background: var(--primary-light); }

        /* ── 출석 통계 바 ── */
        .stats-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }
        .stat-chip {
            flex: 1;
            background: var(--card);
            border-radius: var(--radius-sm);
            padding: 10px 6px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-num {
            font-size: 1.2rem;
            font-weight: 800;
            color: var(--primary);
            line-height: 1;
        }
        .stat-label {
            font-size: 0.68rem;
            color: var(--text-muted);
            margin-top: 3px;
            font-weight: 700;
        }

        /* ── 테이블 ── */
        .table-container {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }

        thead tr {
            background: var(--bg);
            border-bottom: 1.5px solid var(--border);
        }
        th {
            font-size: 0.72rem;
            font-weight: 800;
            color: var(--text-muted);
            padding: 11px 2px;
            text-align: center;
        }
        th:first-child { text-align: left; padding-left: 14px; }

        td {
            padding: 11px 2px;
            border-bottom: 1px solid var(--border);
            text-align: center;
            vertical-align: middle;
        }
        td:first-child { text-align: left; padding-left: 14px; }

        tbody tr:last-child td { border-bottom: none; }
        tbody tr:nth-child(even) { background: #fafbfc; }
        tbody tr { transition: background 0.1s; }
        tbody tr:active { background: var(--primary-light); }

        .name-text { font-weight: 800; font-size: 0.9rem; display: block; line-height: 1.2; }
        .grade-text { color: var(--text-muted); font-size: 0.72rem; font-weight: 700; }

        /* ── 체크박스 커스텀 (터치 영역 확대) ── */
        .cb-wrap {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1.5px solid var(--border);
            background: white;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }
        .cb-wrap input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            width: 100%;
            height: 100%;
            cursor: pointer;
            margin: 0;
        }
        .cb-wrap .check-icon {
            font-size: 16px;
            display: none;
            pointer-events: none;
        }
        .cb-wrap.checked {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
        .cb-wrap.checked .check-icon { display: block; }

        /* ── 달란트 모달 ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            z-index: 2000;
            justify-content: center;
            align-items: flex-end;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }

        .modal-sheet {
            background: white;
            width: 100%;
            max-width: 560px;
            border-radius: 24px 24px 0 0;
            padding: 20px 20px 40px;
            max-height: 82vh;
            overflow-y: auto;
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-handle {
            width: 40px; height: 4px;
            background: var(--border);
            border-radius: 2px;
            margin: 0 auto 16px;
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .modal-title { font-size: 1.1rem; font-weight: 800; color: #92400e; }
        .modal-close {
            width: 30px; height: 30px;
            border-radius: 50%;
            border: none;
            background: var(--bg);
            cursor: pointer;
            font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-muted);
        }

        .talent-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 11px 0;
            border-bottom: 1px solid var(--border);
        }
        .talent-item:last-child { border-bottom: none; }

        .rank-circle {
            width: 26px; height: 26px;
            border-radius: 50%;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.7rem; font-weight: 800;
            color: var(--text-muted);
            margin-right: 10px;
            flex-shrink: 0;
        }
        .rank-circle.gold { background: var(--gold); color: white; }
        .rank-circle.silver { background: #94a3b8; color: white; }
        .rank-circle.bronze { background: #cd7f32; color: white; }

        .talent-name { font-weight: 800; font-size: 0.92rem; }
        .talent-grade { font-size: 0.72rem; color: var(--text-muted); margin-left: 4px; }

        .score-controls { display: flex; align-items: center; gap: 8px; }
        .score-btn {
            width: 34px; height: 34px;
            border-radius: 50%;
            border: 1.5px solid var(--border);
            background: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.12s;
        }
        .score-btn.minus { color: var(--primary); border-color: #bfdbfe; background: var(--primary-light); }
        .score-btn.plus { color: var(--danger); border-color: #fecaca; background: var(--danger-bg); }
        .score-btn:active { transform: scale(0.9); }
        .score-value { font-weight: 800; color: var(--gold); min-width: 42px; text-align: center; font-size: 0.95rem; transition: color 0.2s; }

        /* ── 토스트 ── */
        #toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: #1e293b;
            color: white;
            padding: 11px 22px;
            border-radius: 50px;
            font-size: 0.85rem;
            font-weight: 700;
            z-index: 3000;
            white-space: nowrap;
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.2s;
            opacity: 0;
            pointer-events: none;
        }
        #toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* ── 로딩 상태 ── */
        @keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.4 } }
        .skeleton-box { background: #e2e8f0; border-radius: 4px; animation: pulse 1.2s infinite ease-in-out; }
    </style>
</head>
<body>

<div id="toast"></div>

<div id="talentModal" class="modal-overlay" onclick="handleOverlayClick(event)">
    <div class="modal-sheet">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div class="modal-title">💰 달란트 현황</div>
            <button class="modal-close" onclick="closeTalentModal()">✕</button>
        </div>
        <div id="talentList"></div>
    </div>
</div>

<div class="main-container">

    <div class="header-card">
        <div class="header-top">
            <div class="app-title">⛪ 초등부 출석부</div>
            <button class="talent-btn" onclick="openTalentModal()">💰 달란트</button>
        </div>
        <div class="controls">
            <input type="date" id="datePicker" class="styled-input" onchange="onDateChange(this.value)">
            <select class="styled-input" id="gradeFilter" onchange="onGradeChange()">
                <option value="all">📋 전체</option>
                <option value="1">🌱 1학년</option>
                <option value="2">🌿 2학년</option>
                <option value="3">🌳 3학년</option>
                <option value="4">🍎 4학년</option>
                <option value="5">🏫 5학년</option>
                <option value="6">🎓 6학년</option>
            </select>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat-chip">
            <div class="stat-num" id="stat-total">-</div>
            <div class="stat-label">전체</div>
        </div>
        <div class="stat-chip">
            <div class="stat-num" id="stat-attend" style="color:var(--success)">-</div>
            <div class="stat-label">✅ 출석</div>
        </div>
        <div class="stat-chip">
            <div class="stat-num" id="stat-offering" style="color:var(--gold)">-</div>
            <div class="stat-label">💰 헌금</div>
        </div>
        <div class="stat-chip">
            <div class="stat-num" id="stat-recite" style="color:var(--primary)">-</div>
            <div class="stat-label">📖 암송</div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th style="width:29%">이름</th>
                    <th>✅출석</th>
                    <th>📙머릿돌</th>
                    <th>💰헌금</th>
                    <th>📖암송</th>
                    <th>📚월암송</th>
                </tr>
            </thead>
            <tbody id="studentList"></tbody>
        </table>
    </div>

</div>

<script>
// ────────────────────────────────────────────
//  설정
// ────────────────────────────────────────────
const GAS_URL = "https://script.google.com/macros/s/AKfycbyrwr1qxafE5k0zlacQLHTYgF2zKfUYFjdV3fymWrDdliOz1kYLV7ZHIdITvJEKyuxwpQ/exec";

const COLUMNS = ["attendance", "keystone", "offering", "recitation", "monthlyRecitation"];

const STUDENTS = [
    { grade:"1", name:"김지호" }, { grade:"1", name:"신채은" },
    { grade:"2", name:"김세아" }, { grade:"2", name:"백윤우" }, { grade:"2", name:"신리호" }, { grade:"2", name:"이가은" }, { grade:"2", name:"이예안" }, { grade:"2", name:"최다솔" },
    { grade:"3", name:"김민찬" }, { grade:"3", name:"김유성" }, { grade:"3", name:"박지한" }, { grade:"3", name:"배민하" }, { grade:"3", name:"이유현" }, { grade:"3", name:"주인성" },
    { grade:"4", name:"김시아" }, { grade:"4", name:"김유나" }, { grade:"4", name:"임정우" }, { grade:"4", name:"김동하B" }, { grade:"4", name:"박태온" }, { grade:"4", name:"유시영" }, { grade:"4", name:"최지온" },
    { grade:"5", name:"박이한" }, { grade:"5", name:"임승주" }, { grade:"5", name:"주현성" }, { grade:"5", name:"김동현" },
    { grade:"6", name:"박지율" }, { grade:"6", name:"이세은" }, { grade:"6", name:"조윤서" }, { grade:"6", name:"김하이" }, { grade:"6", name:"김서윤" }, { grade:"6", name:"박도이" }, { grade:"6", name:"이하영" }, { grade:"6", name:"김동훈" }, { grade:"6", name:"최지율" }, { grade:"6", name:"김가온" }, { grade:"6", name:"김다현" }, { grade:"6", name:"김동하A" }, { grade:"6", name:"장선우" }, { grade:"6", name:"임재율" }
];

// ────────────────────────────────────────────
//  상태 및 이탈 방지 이벤트
// ────────────────────────────────────────────
let targetDate = "";
let currentList = [...STUDENTS];
const saveTimers = {};   // debounce per student
let toastTimer = null;

// 저장 중 페이지 이탈 방지
window.addEventListener("beforeunload", (e) => {
    if (Object.keys(saveTimers).length > 0) {
        e.preventDefault();
        e.returnValue = "아직 저장 중인 데이터가 있습니다. 페이지를 나가시겠습니까?";
    }
});

// ────────────────────────────────────────────
//  유틸
// ────────────────────────────────────────────
function toast(msg, duration = 1800) {
    const el = document.getElementById("toast");
    el.textContent = msg;
    el.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove("show"), duration);
}

function getSunday() {
    const today = new Date();
    const day = today.getDay();
    const diff = day === 0 ? 0 : (day <= 3 ? -day : 7 - day);
    const sunday = new Date(today);
    sunday.setDate(today.getDate() + diff);
    return sunday.toISOString().split("T")[0];
}

// ────────────────────────────────────────────
//  렌더링
// ────────────────────────────────────────────
function renderSkeleton() {
    const tbody = document.getElementById("studentList");
    tbody.innerHTML = Array(6).fill(0).map(() => `
        <tr>
            <td>
                <div class="skeleton-box" style="height:16px; width:70%; margin-bottom:6px;"></div>
                <div class="skeleton-box" style="height:12px; width:45%;"></div>
            </td>
            ${COLUMNS.map(() => `<td><div class="skeleton-box" style="width:36px; height:36px; border-radius:8px; margin:0 auto;"></div></td>`).join("")}
        </tr>
    `).join("");
}

function renderTable(list) {
    currentList = list;
    const tbody = document.getElementById("studentList");
    tbody.innerHTML = list.map(s => `
        <tr data-name="${s.name}" data-grade="${s.grade}">
            <td>
                <span class="name-text">${s.name}</span>
                <span class="grade-text">${s.grade}학년</span>
            </td>
            ${COLUMNS.map(col => `
            <td>
                <label class="cb-wrap" onclick="onCheckboxClick(this, '${s.name}', '${s.grade}')">
                    <input type="checkbox" data-type="${col}">
                    <span class="check-icon">✓</span>
                </label>
            </td>`).join("")}
        </tr>
    `).join("");
    updateStats();
}

function updateStats() {
    const rows = document.querySelectorAll("#studentList tr");
    const total = rows.length;
    let attend = 0, offering = 0, recite = 0;
    rows.forEach(tr => {
        if (tr.querySelector('[data-type="attendance"]')?.checked) attend++;
        if (tr.querySelector('[data-type="offering"]')?.checked) offering++;
        if (tr.querySelector('[data-type="recitation"]')?.checked) recite++;
    });
    document.getElementById("stat-total").textContent = total;
    document.getElementById("stat-attend").textContent = attend;
    document.getElementById("stat-offering").textContent = offering;
    document.getElementById("stat-recite").textContent = recite;
}

// ────────────────────────────────────────────
//  체크박스 클릭 핸들러
// ────────────────────────────────────────────
function onCheckboxClick(label, name, grade) {
    setTimeout(() => {
        const input = label.querySelector("input");
        if (input.checked) {
            label.classList.add("checked");
        } else {
            label.classList.remove("checked");
        }
        updateStats();
        scheduleAutoSave(name, grade);
    }, 0);
}

// ────────────────────────────────────────────
//  데이터 로드
// ────────────────────────────────────────────
async function loadData() {
    renderSkeleton(); // 스켈레톤 로딩 먼저 보여주기
    toast("🔄 불러오는 중...", 9999);
    
    try {
        const res = await fetch(`${GAS_URL}?date=${targetDate}&t=${Date.now()}`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        // 현재 필터 상태에 맞춰 테이블 실제 렌더링
        const grade = document.getElementById("gradeFilter").value;
        const list = grade === "all" ? STUDENTS : STUDENTS.filter(s => s.grade === grade);
        renderTable(list);

        // 데이터 반영
        if (Array.isArray(data)) {
            data.forEach(item => {
                const name = String(item.name).trim();
                const grade = String(item.grade).trim();
                const tr = document.querySelector(`tr[data-name="${name}"][data-grade="${grade}"]`);
                if (!tr) return;
                
                COLUMNS.forEach(col => {
                    if (item[col]) {
                        const cb = tr.querySelector(`[data-type="${col}"]`);
                        if (cb) {
                            cb.checked = true;
                            cb.closest(".cb-wrap").classList.add("checked");
                        }
                    }
                });
            });
        }
        updateStats();
        toast("✅ 동기화 완료!");
    } catch (e) {
        console.error("loadData error:", e);
        toast("❌ 불러오기 실패 – 재시도 해주세요");
    }
}

// ────────────────────────────────────────────
//  자동 저장 (디바운스 0.8초)
// ────────────────────────────────────────────
function scheduleAutoSave(name, grade) {
    const key = `${name}__${grade}`;
    toast("⏳ 저장 대기 중...", 9999);
    clearTimeout(saveTimers[key]);
    saveTimers[key] = setTimeout(() => doSave(name, grade), 800);
}

async function doSave(name, grade) {
    const tr = document.querySelector(`tr[data-name="${name}"][data-grade="${grade}"]`);
    if (!tr) return;

    const payload = [{
        date: targetDate,
        name,
        grade: String(grade),
        ...Object.fromEntries(
            COLUMNS.map(col => [col, tr.querySelector(`[data-type="${col}"]`)?.checked ?? false])
        )
    }];

    try {
        // mode: "no-cors" 제거 및 text/plain 사용 (응답 확인 위함)
        const res = await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        });
        
        if (!res.ok) throw new Error("서버 응답 오류");
        toast(`✅ ${name} 저장 완료`);
    } catch (e) {
        console.error("doSave error:", e);
        toast(`⚠️ ${name} 저장 실패 - 네트워크 확인`);
    } finally {
        const key = `${name}__${grade}`;
        delete saveTimers[key]; // 완료 후 대기열에서 제거
    }
}

// ────────────────────────────────────────────
//  이벤트 핸들러
// ────────────────────────────────────────────
async function onDateChange(val) {
    targetDate = val;
    await loadData();
}

async function onGradeChange() {
    await loadData(); // loadData 내부에서 필터링 후 렌더링되도록 처리
}

// ────────────────────────────────────────────
//  달란트 모달 (낙관적 업데이트 반영)
// ────────────────────────────────────────────
async function openTalentModal() {
    document.body.classList.add("modal-open"); // 배경 스크롤 차단
    const modal = document.getElementById("talentModal");
    modal.classList.add("open");
    
    const listEl = document.getElementById("talentList");
    const grade = document.getElementById("gradeFilter").value;
    listEl.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text-muted)">로딩 중... ⏳</div>`;

    try {
        const res = await fetch(`${GAS_URL}?action=getTalents&t=${Date.now()}`);
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        const filtered = grade === "all" ? data : data.filter(d => String(d.grade).trim() === grade);

        if (!filtered.length) {
            listEl.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text-muted)">데이터가 없습니다.</div>`;
            return;
        }

        listEl.innerHTML = filtered.map((item, i) => {
            let badgeClass = "rank-circle";
            if (grade === "all") {
                if (i === 0) badgeClass += " gold";
                else if (i === 1) badgeClass += " silver";
                else if (i === 2) badgeClass += " bronze";
            }
            return `
                <div class="talent-item">
                    <div style="display:flex;align-items:center;">
                        <div class="${badgeClass}">${i + 1}</div>
                        <div>
                            <span class="talent-name">${item.name}</span>
                            <span class="talent-grade">${item.grade}학년</span>
                        </div>
                    </div>
                    <div class="score-controls">
                        <button class="score-btn minus" onclick="changeTalent(event, '${item.name}', '${item.grade}', -1)">−</button>
                        <span class="score-value">${item.score}p</span>
                        <button class="score-btn plus" onclick="changeTalent(event, '${item.name}', '${item.grade}', 1)">+</button>
                    </div>
                </div>`;
        }).join("");
    } catch (e) {
        console.error("openTalentModal error:", e);
        listEl.innerHTML = `<div style="text-align:center;padding:30px;color:var(--danger)">데이터 로드 실패 😢</div>`;
    }
}

function closeTalentModal() {
    document.body.classList.remove("modal-open");
    document.getElementById("talentModal").classList.remove("open");
}

function handleOverlayClick(e) {
    if (e.target === document.getElementById("talentModal")) closeTalentModal();
}

async function changeTalent(e, name, grade, delta) {
    // 1. 낙관적 업데이트: 서버 응답 대기 전에 UI 먼저 변경
    const scoreContainer = e.target.parentElement;
    const scoreValueEl = scoreContainer.querySelector('.score-value');
    const currentScore = parseInt(scoreValueEl.innerText);
    const newScore = currentScore + delta;
    
    scoreValueEl.innerText = `${newScore}p`;
    scoreValueEl.style.color = delta > 0 ? "var(--danger)" : "var(--primary)"; // 클릭 피드백
    setTimeout(() => scoreValueEl.style.color = "var(--gold)", 300);

    // 2. 백그라운드 서버 통신
    const payload = { action: "updateScore", name, grade: String(grade), delta };
    try {
        const res = await fetch(GAS_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify(payload)
        });
        
        if (!res.ok) throw new Error("업데이트 실패");
        toast(`💰 ${name} ${delta > 0 ? '+'+delta : delta}p 반영 완료`);
    } catch (err) {
        console.error("changeTalent error:", err);
        toast("⚠️ 통신 오류로 점수가 롤백됩니다.");
        // 실패 시 UI 원상 복구
        scoreValueEl.innerText = `${currentScore}p`;
        scoreValueEl.style.color = "var(--gold)";
    }
}

    targetDate = getSunday();
    document.getElementById("datePicker").value = targetDate;
    await loadData(); // 초기 렌더링은 loadData 스켈레톤부터 수행
});
