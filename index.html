<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>초등부 출석부</title>
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    <style>
        :root {
            --primary: #4a90e2;
            --bg-color: #f5f7fa;
            --card-bg: #ffffff;
            --text-dark: #333;
            --text-light: #999;
            --success: #28a745;
            --danger: #dc3545;
            --gold: #f1c40f;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            margin: 0; padding: 20px 15px;
            background: var(--bg-color);
            color: var(--text-dark);
            -webkit-tap-highlight-color: transparent;
        }

        .main-container { max-width: 600px; margin: 0 auto; }

        .header-card {
            background: var(--card-bg);
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            text-align: center;
            position: relative;
        }

        .talent-link {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 0.8rem; color: #d68910; font-weight: 700;
            background: #fff9e6; padding: 6px 12px;
            border-radius: 12px; border: 1px solid var(--gold);
            cursor: pointer; box-shadow: 0 2px 5px rgba(241, 196, 15, 0.2);
        }

        .app-title {
            margin: 0 0 20px 0; font-size: 1.6rem; font-weight: 800;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        .control-group { display: flex; flex-direction: column; gap: 12px; }

        .styled-input {
            width: 100%; padding: 14px; font-size: 1rem;
            border: 2px solid #edf0f2; border-radius: 12px;
            color: var(--text-dark); font-weight: 700;
            background: white; box-sizing: border-box; text-align: center;
            outline: none; transition: border-color 0.2s;
        }

        .styled-input:focus { border-color: var(--primary); }
        #datePicker { color: var(--primary); border-color: var(--primary); }

        .table-container {
            background: var(--card-bg); border-radius: 20px;
            overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eee;
        }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th {
            background: #f8f9fa; color: #666; font-weight: 700; font-size: 0.8rem;
            padding: 15px 2px; border-bottom: 2px solid #eee;
        }
        td { padding: 12px 2px; border-bottom: 1px solid #f1f3f5; text-align: center; vertical-align: middle; }
        tbody tr:nth-child(even) { background-color: #fafafa; }
        .name-cell { text-align: left; padding-left: 15px; }
        .name-text { font-weight: 800; font-size: 0.95rem; display: block; }
        .grade-text { color: var(--text-light); font-size: 0.8rem; }

        input[type="checkbox"] { width: 26px; height: 26px; accent-color: var(--primary); cursor: pointer; }

        #talentModal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            z-index: 2000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: white; width: 90%; max-width: 400px;
            border-radius: 24px; padding: 25px; max-height: 80vh;
            overflow-y: auto; position: relative;
        }
        .modal-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 20px; text-align: center; color: #d68910; }
        .talent-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 5px; border-bottom: 1px solid #f5f5f5;
        }
        .score-controls { display: flex; align-items: center; gap: 10px; }
        .score-btn {
            width: 32px; height: 32px; border-radius: 50%; border: 1px solid #ddd;
            background: white; font-size: 1.2rem; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .score-btn.plus { color: var(--danger); background: #fff5f5; border-color: #ffcccc; }
        .score-btn.minus { color: var(--primary); background: #f0f7ff; border-color: #cce0ff; }
        .score-text { font-weight: 800; color: #d68910; min-width: 40px; text-align: center; }

        .rank-badge {
            width: 24px; height: 24px; background: #f0f0f0; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.75rem; font-weight: 700; margin-right: 10px; color: #666;
        }
        /* 🏆 전체 학년 보기에서만 적용될 금색 스타일 */
        .rank-badge.rank-1 { background-color: var(--gold) !important; color: white !important; }

        #status {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); color: white;
            padding: 12px 24px; border-radius: 50px; font-size: 14px;
            display: none; z-index: 3000; align-items: center; gap: 8px;
            white-space: nowrap;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; color: #ccc; }
    </style>
</head>
<body>

    <div id="status">☁️ 데이터를 동기화 중...</div>

    <div id="talentModal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeTalentModal()">&times;</span>
            <div class="modal-title">💰 누적 달란트 현황</div>
            <div id="talentList">로딩 중... ⏳</div>
        </div>
    </div>

    <div class="main-container">
        <div class="header-card">
            <div class="talent-link" onclick="openTalentModal()">💰 달란트 현황</div>
            <h1 class="app-title"><span>⛪</span> 초등부 출석부</h1>
            <div class="control-group">
                <input type="date" id="datePicker" class="styled-input" onchange="updateTargetDate(this.value)">
                <select class="styled-input" id="gradeFilter" onchange="filterStudents()">
                    <option value="all">📋 전체 학년 보기</option>
                    <option value="1">🌱 1학년</option><option value="2">🌿 2학년</option><option value="3">🌳 3학년</option>
                    <option value="4">🍎 4학년</option><option value="5">🏫 5학년</option><option value="6">🎓 6학년</option>
                </select>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 28%;">이름</th>
                        <th>✅출석</th><th>📙머릿돌</th><th>💰헌금</th><th>📖암송</th><th>📚️월암송</th>
                    </tr>
                </thead>
                <tbody id="studentList"></tbody>
            </table>
        </div>
    </div>

    <script>
        const students = [
            { grade: "1", name: "김지호" }, { grade: "1", name: "신채은" },
            { grade: "2", name: "김세아" }, { grade: "2", name: "백윤우" }, { grade: "2", name: "신리호" }, { grade: "2", name: "이가은" }, { grade: "2", name: "이예안" }, { grade: "2", name: "최다솔" },
            { grade: "3", name: "김민찬" }, { grade: "3", name: "김유성" }, { grade: "3", name: "박지한" }, { grade: "3", name: "배민하" }, { grade: "3", name: "이유현" }, { grade: "3", name: "주인성" },
            { grade: "4", name: "김시아" }, { grade: "4", name: "김유나" }, { grade: "4", name: "임정우" }, { grade: "4", name: "김동하B" }, { grade: "4", name: "박태온" }, { grade: "4", name: "유시영" }, { grade: "4", name: "최지온" },
            { grade: "5", name: "박이한" }, { grade: "5", name: "임승주" }, { grade: "5", name: "주현성" }, { grade: "5", name: "김동현" },
            { grade: "6", name: "박지율" }, { grade: "6", name: "조윤서" }, { grade: "6", name: "김하이" }, { grade: "6", name: "김서윤" }, { grade: "6", name: "박도이" }, { grade: "6", name: "이하영" }, { grade: "6", name: "김동훈" }, { grade: "6", name: "최지율" }, { grade: "6", name: "김가온" }, { grade: "6", name: "김다현" }, { grade: "6", name: "김동하A" }, { grade: "6", name: "장선우" }, { grade: "6", name: "임재율" }
        ];

        const GAS_URL = "https://script.google.com/macros/s/AKfycbzdgDjFIkYA4JO60pjEZPg974MZUEjjd_jB7_EQ4awmiXdl81XsjRIL9JeHR6eyrK4g_g/exec"; 

        let targetDate = "";

        // 💰 달란트 현황 로드 (필터 및 전체1등 금색 배지 적용)
        async function openTalentModal() {
            document.getElementById('talentModal').style.display = 'flex';
            const listEl = document.getElementById('talentList');
            const selectedGrade = document.getElementById('gradeFilter').value;
            const isAllGrades = (selectedGrade === 'all');
            const gradeText = isAllGrades ? "전체 학년" : `${selectedGrade}학년`;
            
            listEl.innerHTML = `${gradeText} 로딩 중... ⏳`;
            
            try {
                const res = await fetch(`${GAS_URL}?action=getTalents&t=${Date.now()}`);
                const data = await res.json();
                
                const filteredData = data.filter(item => {
                    if (isAllGrades) return true;
                    return String(item.grade).trim() === String(selectedGrade).trim();
                });

                if (filteredData.length === 0) {
                    listEl.innerHTML = `<div style="text-align:center; padding:20px; color:#999;">데이터가 없습니다.</div>`;
                    return;
                }
                
                listEl.innerHTML = filteredData.map((item, index) => {
                    // ✅ 전체 학년 보기에서만 1등(index 0)에게 rank-1 클래스 부여
                    const badgeClass = (isAllGrades && index === 0) ? 'rank-badge rank-1' : 'rank-badge';
                    return `
                        <div class="talent-item">
                            <div style="display:flex; align-items:center;">
                                <div class="${badgeClass}">${index + 1}</div>
                                <div>
                                    <span style="font-weight:700;">${item.name}</span>
                                    <span style="font-size:0.75rem; color:#999;"> (${item.grade}학년)</span>
                                </div>
                            </div>
                            <div class="score-controls">
                                <button class="score-btn minus" onclick="changeTalent('${item.name}', '${item.grade}', -1)">-</button>
                                <span class="score-text">${item.score}p</span>
                                <button class="score-btn plus" onclick="changeTalent('${item.name}', '${item.grade}', 1)">+</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                listEl.innerHTML = "데이터 로드 실패 😢";
            }
        }

        function closeTalentModal() { document.getElementById('talentModal').style.display = 'none'; }

        async function changeTalent(name, grade, delta) {
            showStatus("💰 점수 반영 중...", "#333");
            const payload = { action: 'updateScore', name: name, grade: String(grade), delta: delta };
            try {
                await fetch(GAS_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
                setTimeout(openTalentModal, 300); 
                showStatus(`${name} 반영 완료`, "var(--success)", 1000);
            } catch (e) { showStatus("오류 발생", "var(--danger)", 2000); }
        }

        // 🔍 출석 데이터 불러오기
        async function loadData() {
            showStatus("🔍 동기화 중...", "#333");
            try {
                const res = await fetch(`${GAS_URL}?date=${targetDate}&t=${Date.now()}`);
                const savedData = await res.json();
                document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
                
                if (savedData.length > 0) {
                    savedData.forEach(item => {
                        const tr = document.querySelector(`tr[data-name="${String(item.name).trim()}"][data-grade="${String(item.grade).trim()}"]`);
                        if (tr) {
                            if(item.attendance) tr.querySelector('[data-type="attendance"]').checked = true;
                            if(item.keystone) tr.querySelector('[data-type="keystone"]').checked = true;
                            if(item.offering) tr.querySelector('[data-type="offering"]').checked = true;
                            if(item.recitation) tr.querySelector('[data-type="recitation"]').checked = true;
                            if(item.monthlyRecitation) tr.querySelector('[data-type="monthlyRecitation"]').checked = true;
                        }
                    });
                }
                showStatus("✨ 동기화 완료!", "#28a745", 1000);
            } catch (e) { showStatus("❌ 동기화 실패", "#dc3545", 2000); }
        }

        // ☁️ 저장 최적화 (Debounce: 0.8초간 대기 후 저장)
        let saveTimeouts = {}; 
        function autoSave(name, grade) {
            const studentKey = `${name}_${grade}`;
            showStatus("⏳ 저장 대기 중...", "#666");

            if (saveTimeouts[studentKey]) clearTimeout(saveTimeouts[studentKey]);

            saveTimeouts[studentKey] = setTimeout(async () => {
                showStatus(`☁️ ${name} 저장 중...`, "#333");
                const tr = document.querySelector(`tr[data-name="${name}"][data-grade="${String(grade)}"]`);
                const payload = [{
                    date: targetDate, name: name, grade: String(grade),
                    attendance: tr.querySelector('[data-type="attendance"]').checked,
                    keystone: tr.querySelector('[data-type="keystone"]').checked,
                    offering: tr.querySelector('[data-type="offering"]').checked,
                    recitation: tr.querySelector('[data-type="recitation"]').checked,
                    monthlyRecitation: tr.querySelector('[data-type="monthlyRecitation"]').checked
                }];

                try {
                    await fetch(GAS_URL, { method: "POST", mode: 'no-cors', body: JSON.stringify(payload) });
                    showStatus(`✅ ${name} 저장 완료`, "var(--success)", 1000);
                } catch (e) { showStatus("⚠️ 저장 실패", "var(--danger)", 2000); }
            }, 800);
        }

        function showStatus(msg, color, delay) {
            const el = document.getElementById('status');
            el.innerHTML = msg; el.style.backgroundColor = color; el.style.display = 'flex';
            if(delay) setTimeout(() => el.style.display = 'none', delay);
        }

        function setSmartDate() {
            const today = new Date();
            const diff = (today.getDay() >= 3) ? (7 - today.getDay()) : -today.getDay();
            const sunday = new Date();
            sunday.setDate(today.getDate() + diff);
            targetDate = sunday.toISOString().split('T')[0];
            document.getElementById('datePicker').value = targetDate;
        }

        function renderTable(list) {
            const tbody = document.getElementById('studentList');
            tbody.innerHTML = list.map(s => `
                <tr data-name="${s.name}" data-grade="${s.grade}">
                    <td class="name-cell"><span class="name-text">${s.name}</span><span class="grade-text">${s.grade}학년</span></td>
                    <td><input type="checkbox" onchange="autoSave('${s.name}', '${s.grade}')" data-type="attendance"></td>
                    <td><input type="checkbox" onchange="autoSave('${s.name}', '${s.grade}')" data-type="keystone"></td>
                    <td><input type="checkbox" onchange="autoSave('${s.name}', '${s.grade}')" data-type="offering"></td>
                    <td><input type="checkbox" onchange="autoSave('${s.name}', '${s.grade}')" data-type="recitation"></td>
                    <td><input type="checkbox" onchange="autoSave('${s.name}', '${s.grade}')" data-type="monthlyRecitation"></td>
                </tr>
            `).join('');
        }

        async function updateTargetDate(val) { targetDate = val; await loadData(); }
        async function filterStudents() {
            const grade = document.getElementById('gradeFilter').value;
            renderTable(grade === 'all' ? students : students.filter(s => s.grade === grade));
            await loadData();
        }

        window.onload = async () => { setSmartDate(); renderTable(students); await loadData(); };
    </script>
</body>
</html>
